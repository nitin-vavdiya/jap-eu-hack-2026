apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-qa
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  # No Image Updater annotations — promotion to qa is manual via workflow_dispatch (promote.yml)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/smartSenseSolutions/jap-eu-hack-2026
    targetRevision: main
    path: helm/app-chart
    helm:
      valueFiles:
        - values.yaml
        - values-qa.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

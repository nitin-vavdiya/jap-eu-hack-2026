apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  # No Image Updater annotations — prod promotion is strictly manual via workflow_dispatch (promote.yml)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/smartSenseSolutions/jap-eu-hack-2026
    targetRevision: main
    path: helm/app-chart
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  # Manual sync for prod — promotion PR merge triggers sync via controller, not auto
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

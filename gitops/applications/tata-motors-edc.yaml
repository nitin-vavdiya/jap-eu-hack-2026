apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edc-tata-motors
  namespace: argocd
  labels:
    tenant: tata-motors
    managed-by: edc-provisioning
spec:
  project: default
  source:
    repoURL: https://github.com/smartSenseSolutions/jap-eu-hack-2026
    targetRevision: HEAD
    path: edc/tx-edc-eleven
    helm:
      valueFiles:
        - values.yaml
        - values-tata-motors.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: edc-tata-motors
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

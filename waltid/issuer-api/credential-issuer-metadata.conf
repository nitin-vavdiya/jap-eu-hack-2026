    "LegalParticipant_jwt_vc_json": {
      "format": "jwt_vc_json",
      "cryptographic_binding_methods_supported": ["did:web", "did:key", "did:jwk"],
      "credential_signing_alg_values_supported": ["RS256", "ES256", "EdDSA"],
      "credential_definition": {
        "type": ["VerifiableCredential", "LegalParticipant"],
        "credentialSubject": {
          "legalName": { "mandatory": true, "display": [{ "name": "Legal Name" }] },
          "legalRegistrationNumber": { "mandatory": true, "display": [{ "name": "Registration Number" }] },
          "legalAddress": { "mandatory": true, "display": [{ "name": "Legal Address" }] },
          "headquartersAddress": { "mandatory": false, "display": [{ "name": "HQ Address" }] }
        }
      },
      "display": [{ "name": "Gaia-X Legal Participant Credential" }]
    },
    "OrgVC_jwt_vc_json": {

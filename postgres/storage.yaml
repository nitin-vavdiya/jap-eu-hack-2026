apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: edc-postgres
spec:
  storageClassName: local-storage
  volumeName: postgres-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi


---

# Local storage
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-storage
spec:
  storageClassName: local-storage
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data/edc-postgres"
    type: DirectoryOrCreate

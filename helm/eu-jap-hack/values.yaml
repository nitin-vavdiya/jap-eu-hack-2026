global:
  imageRegistry: ""
  imagePullSecrets: []

# -- Ingress class name (haproxy)
ingressClassName: haproxy

# -- TLS configuration via cert-manager
tls:
  enabled: true
  clusterIssuer: letsencrypt-prod

# =============================================================================
# Backend API
# =============================================================================
backend:
  replicaCount: 1
  image:
    repository: eu-jap-hack/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
  ingress:
    host: ""  # e.g. api.example.com
  env:
    DATABASE_URL: ""  # e.g. postgresql://user:pass@host:5432/db
    ENABLE_EDC: "true"
    AUTH_ENABLED: "false"
    GAIAX_DID_DOMAIN: ""
    GAIAX_DID_PATH: ""
    EDC_BASE_URL: ""
    EDC_API_KEY: ""
    BPN_NUMBER: ""
    APP_BASE_URL: ""
    EDC_ACCESS_POLICY_ID: ""
    EDC_CONTRACT_POLICY_ID: ""
    EDC_CONSUMER_MANAGEMENT_URL: ""
    EDC_CONSUMER_API_KEY: ""
    EDC_NEGOTIATION_INITIAL_DELAY_MS: "5000"
    EDC_NEGOTIATION_POLL_INTERVAL_MS: "5000"
    EDC_NEGOTIATION_MAX_RETRIES: "3"
    CADDE_ASSET_ID: ""
    CADDE_PARTNER_EDC_DSP_URL: ""
    CADDE_PARTNER_EDC_BPN: ""
    PROVISIONING_SERVICE_URL: ""  # e.g. http://eu-jap-hack-provisioning:3001
    PROVISIONING_CALLBACK_SECRET: ""  # Shared secret for provisioning service → backend callback (X-Internal-Token header)
    # ---------------------------------------------------------------------------
    # Walt.id Operator Wallet (per-company SSI — ADR-002)
    # The platform operator wallet is bootstrapped automatically on startup.
    # OPERATOR_WALLET_PASSWORD must be ≥32 characters (walt.id JWT secret requirement).
    # ---------------------------------------------------------------------------
    WALTID_WALLET_URL: "http://eu-jap-hack-waltid-wallet:7001"
    WALTID_ISSUER_URL: "http://eu-jap-hack-waltid-issuer:7002"
    WALTID_VERIFIER_URL: "http://eu-jap-hack-waltid-verifier:7003"
    OPERATOR_WALLET_EMAIL: "operator@wallet.internal"
    OPERATOR_WALLET_PASSWORD: ""  # [secret] must be ≥32 chars — e.g. "smartsense-operator-secret-key-prod-2026"
    OPERATOR_WALLET_DISPLAY_NAME: "SmartSense Operator"
    OPERATOR_WALLET_FAIL_ON_ERROR: "true"  # crash on startup if operator wallet bootstrap fails (recommended for prod)
    # ---------------------------------------------------------------------------
    # HashiCorp Vault — stores operator wallet credentials and per-company keys
    # ---------------------------------------------------------------------------
    VAULT_ADDR: ""      # e.g. http://vault.vault.svc.cluster.local:8200
    VAULT_TOKEN: ""     # [secret] Vault token with KV read/write on secret/operator/wallet and secret/companies/*
    VAULT_KV_MOUNT: "secret"
    VAULT_OPERATOR_WALLET_PATH: "operator/wallet"  # KV path where operator wallet creds are persisted after bootstrap
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi


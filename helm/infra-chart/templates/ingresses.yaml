{{- if .Values.argocd.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    {{- include "infra-chart.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    haproxy.org/ssl-redirect: "true"
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - {{ include "infra-chart.host" (dict "subdomain" "argocd" "ctx" .) }}
      secretName: argocd-server-tls
  rules:
    - host: {{ include "infra-chart.host" (dict "subdomain" "argocd" "ctx" .) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
{{- end }}
---
{{- if .Values.monitoring.prom.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infra-chart.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    haproxy.org/ssl-redirect: "true"
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - {{ include "infra-chart.host" (dict "subdomain" "grafana" "ctx" .) }}
      secretName: grafana-tls
  rules:
    - host: {{ include "infra-chart.host" (dict "subdomain" "grafana" "ctx" .) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infra-grafana
                port:
                  number: 80
{{- end }}

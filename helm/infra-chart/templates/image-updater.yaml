{{- if and .Values.argocd.enabled .Values.imageUpdater.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    {{- include "infra-chart.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    {{- include "infra-chart.labels" . | nindent 4 }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: argocd-image-updater
    namespace: argocd
roleRef:
  kind: Role
  name: argocd-image-updater
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  registries.conf: |
    registries:
      - name: ECR Public
        api_url: https://public.ecr.aws
        prefix: public.ecr.aws
        ping: yes
        default: true
  log.level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    {{- include "infra-chart.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: argocd-image-updater }
  template:
    metadata:
      labels: { app.kubernetes.io/name: argocd-image-updater }
    spec:
      serviceAccountName: argocd-image-updater
      containers:
        - name: argocd-image-updater
          image: {{ .Values.imageUpdater.image.repository }}:{{ .Values.imageUpdater.image.tag }}
          command: [/usr/local/bin/argocd-image-updater, run]
          env:
            - name: ARGOCD_SERVER
              value: argocd-server.argocd.svc.cluster.local
            - name: ARGOCD_INSECURE
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: ssh-key
              mountPath: /app/config/ssh
              readOnly: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
      volumes:
        - name: config
          configMap: { name: argocd-image-updater-config }
        - name: ssh-key
          secret:
            secretName: {{ .Values.imageUpdater.gitSSHSecretName }}
            optional: true
            defaultMode: 0400
{{- end }}

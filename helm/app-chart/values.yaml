# =============================================================================
# Keycloak Identity Provider
# =============================================================================
keycloak:
  enabled: false
  replicaCount: 1
  image:
    repository: eu-jap-hack/keycloak
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  adminUsername: admin
  adminPassword: ""  # required — set in values-custom or secret
  db:
    vendor: postgres
    host: ""                        # templated at render: <fullname>-postgres
    database: keycloak
    username: keycloak
    # password resolved via envFrom → <fullname>-postgres-creds (KC_DB_PASSWORD=POSTGRES_KEYCLOAK_PASSWORD)
  service:
    port: 8080
  ingress:
    subdomain: auth
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi


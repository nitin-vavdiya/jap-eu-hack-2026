# =============================================================================
# EDC Provisioning Service (internal-only, no Ingress)
# =============================================================================
provisioning:
  enabled: true
  replicaCount: 1
  image:
    repository: eu-jap-hack/provisioning
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3001
  env:
    PORT: "3001"
    BACKEND_URL: ""               # e.g. http://eu-jap-hack-backend:8000
    POSTGRES_ADMIN_URL: ""        # postgresql://admin:pass@host:5432/postgres  [secret]
    VAULT_ADDR: ""                # http://vault.vault.svc.cluster.local:8200
    VAULT_TOKEN: ""               # [secret]
    GIT_REPO_PATH: "/repo"
    GIT_REMOTE_URL: ""            # https://github.com/org/repo
    GIT_AUTH_TOKEN: ""            # GitHub PAT with Contents write  [secret]
    GIT_USER_NAME: "edc-provisioning-bot"
    GIT_USER_EMAIL: "edc-provisioning@the-sense.io"
    GIT_REPO_URL: ""              # same as GIT_REMOTE_URL (used in Argo Application source.repoURL)
    ARGOCD_SERVER_URL: ""         # http://argocd-server.argocd.svc.cluster.local (optional)
    ARGOCD_AUTH_TOKEN: ""         # [secret] optional
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# =============================================================================
# Postgres (single pod, multiple DBs)
# =============================================================================
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  storage:
    size: 20Gi
    storageClass: local-path
  databases:
    - name: backend
      user: backend
    - name: keycloak
      user: keycloak
    - name: waltid_wallet
      user: waltid
  superuser: postgres
  # Admin + per-DB passwords are resolved from Vault (via bootstrap) into
  # the k8s Secret "<release>-app-chart-postgres-creds" (envFrom below).
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1500m, memory: 2Gi }

# =============================================================================
# Nightly pg_dump backup CronJob → hostPath
# =============================================================================
backup:
  enabled: true
  schedule: "0 2 * * *"
  retentionDays: 14
  hostPath: /data/backups
  image:
    repository: postgres
    tag: "16-alpine"

# =============================================================================
# NetworkPolicy (default-deny with haproxy + intra-ns allow)
# =============================================================================
networkPolicy:
  enabled: true
  ingressNamespace: infra         # namespace where haproxy runs (= infra-chart release ns)

{{- if .Values.waltidWalletApi.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "app-chart.fullname" . }}-waltid-wallet-data
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: waltid-wallet
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.waltidWalletApi.storage.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.waltidWalletApi.storage.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-chart.fullname" . }}-waltid-wallet
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: waltid-wallet-api
spec:
  replicas: {{ .Values.waltidWalletApi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: waltid-wallet-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: waltid-wallet-api
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: waltid-wallet-api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: waltid-wallet-api
          image: {{ include "app-chart.image" (dict "global" .Values.global "image" .Values.waltidWalletApi.image) }}
          imagePullPolicy: {{ .Values.waltidWalletApi.image.pullPolicy }}
          ports:
            - containerPort: 7001
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /waltid-wallet-api/config/db.conf
              subPath: db.conf
            - name: config
              mountPath: /waltid-wallet-api/config/auth.conf
              subPath: auth.conf
            - name: config
              mountPath: /waltid-wallet-api/config/web.conf
              subPath: web.conf
            {{- if .Values.waltidWalletApi.storage.enabled }}
            - name: data
              mountPath: /waltid-wallet-api/data
            {{- end }}
          resources:
            {{- toYaml .Values.waltidWalletApi.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "app-chart.fullname" . }}-waltid-wallet
        {{- if .Values.waltidWalletApi.storage.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "app-chart.fullname" . }}-waltid-wallet-data
        {{- end }}
---

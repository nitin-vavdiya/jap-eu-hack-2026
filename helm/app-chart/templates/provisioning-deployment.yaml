{{- if .Values.provisioning.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-chart.fullname" . }}-provisioning
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: provisioning
spec:
  replicas: {{ .Values.provisioning.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: provisioning
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provisioning
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: provisioning
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Clone the git repository into a shared volume so the service can
      # commit per-tenant Helm values and Argo CD Application manifests.
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              if [ -d /repo/.git ]; then
                echo "[init] Repo already cloned, pulling latest"
                cd /repo && git pull
              else
                echo "[init] Cloning repository"
                git clone https://$(GIT_AUTH_TOKEN)@$(echo $GIT_REMOTE_URL | sed 's|https://||') /repo
              fi
          env:
            - name: GIT_REMOTE_URL
              value: {{ .Values.provisioning.env.GIT_REMOTE_URL | quote }}
            - name: GIT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "app-chart.fullname" . }}-provisioning-secret
                  key: GIT_AUTH_TOKEN
          volumeMounts:
            - name: repo
              mountPath: /repo

      containers:
        - name: provisioning
          image: {{ include "app-chart.image" (dict "global" .Values.global "image" .Values.provisioning.image) }}
          imagePullPolicy: {{ .Values.provisioning.image.pullPolicy }}
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            {{- $secretKeys := list "POSTGRES_ADMIN_URL" "VAULT_TOKEN" "GIT_AUTH_TOKEN" "ARGOCD_AUTH_TOKEN" }}
            {{- range $key, $value := .Values.provisioning.env }}
            {{- if not (has $key $secretKeys) }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "app-chart.fullname" . }}-provisioning-secret
                optional: true
            - secretRef:
                name: provisioning-vault-token    # created by bootstrap.sh
                optional: false
          volumeMounts:
            - name: repo
              mountPath: /repo
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.provisioning.resources | nindent 12 }}

      volumes:
        - name: repo
          emptyDir: {}
{{- end }}

{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-chart.fullname" . }}-keycloak
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: keycloak
          image: {{ include "app-chart.image" (dict "global" .Values.global "image" .Values.keycloak.image) }}
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
            - containerPort: 9000
              protocol: TCP
              name: management
          env:
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUsername | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: password
            - name: KC_DB
              value: {{ .Values.keycloak.db.vendor | quote }}
            - name: KC_DB_URL
              value: {{ printf "jdbc:postgresql://%s-postgres:5432/%s" (include "app-chart.fullname" .) .Values.keycloak.db.database | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "app-chart.fullname" . }}-postgres-creds
                  key: POSTGRES_KEYCLOAK_PASSWORD
            - name: KC_HOSTNAME
              value: {{ include "app-chart.host" (dict "subdomain" "auth" "ctx" .) | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY
              value: edge
          envFrom:
            - secretRef:
                name: {{ include "app-chart.fullname" . }}-keycloak-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
{{- end }}
